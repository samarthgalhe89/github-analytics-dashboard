<svg viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="strand-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="strand-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
  </defs>

  <!-- DNA Strand 1: left→right→left→right -->
  <path d="M10,4 C10,12 38,12 38,20 C38,28 10,28 10,36 C10,44 38,44 38,52"
        stroke="url(#strand-a)" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- DNA Strand 2: right→left→right→left (opposite phase) -->
  <path d="M38,4 C38,12 10,12 10,20 C10,28 38,28 38,36 C38,44 10,44 10,52"
        stroke="url(#strand-b)" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Connecting rungs at crossover midpoints -->
  <line x1="19" y1="12" x2="29" y2="12" stroke="#6366F1" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <line x1="19" y1="20" x2="29" y2="20" stroke="#6366F1" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="19" y1="28" x2="29" y2="28" stroke="#6366F1" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <line x1="19" y1="36" x2="29" y2="36" stroke="#6366F1" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="19" y1="44" x2="29" y2="44" stroke="#6366F1" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>

  <!-- Endpoint data nodes -->
  <circle cx="10" cy="4" r="3" fill="#8B5CF6"/>
  <circle cx="38" cy="4" r="3" fill="#6366F1"/>
  <circle cx="38" cy="52" r="3" fill="#4F46E5"/>
  <circle cx="10" cy="52" r="3" fill="#79c0ff"/>

  <!-- Center crossover nodes -->
  <circle cx="24" cy="20" r="2" fill="#818CF8" opacity="0.7"/>
  <circle cx="24" cy="36" r="2" fill="#818CF8" opacity="0.7"/>
</svg>